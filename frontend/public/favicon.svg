<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Indigo rounded-xl background -->
  <rect width="32" height="32" rx="7" fill="#4f46e5"/>
  <!-- Trello board outline -->
  <rect x="6" y="6" width="20" height="20" rx="2" fill="none" stroke="white" stroke-width="2"/>
  <!-- Left card column (taller) -->
  <rect x="10" y="10" width="4" height="10" rx="1" fill="white"/>
  <!-- Right card column (shorter) -->
  <rect x="18" y="10" width="4" height="6" rx="1" fill="white"/>
</svg>
